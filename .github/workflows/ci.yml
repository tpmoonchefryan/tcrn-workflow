name: P1 verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: p1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout full clean history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.16.0

      - name: Acquire exact pnpm under explicit online bootstrap policy
        env:
          npm_config_offline: "false"
          npm_config_prefer_offline: "false"
          npm_config_ignore_scripts: "true"
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_update_notifier: "false"
          NO_UPDATE_NOTIFIER: "1"
        run: npm install --global pnpm@11.3.0 --ignore-scripts --no-audit --no-fund --no-update-notifier --prefer-online

      - name: Verify acquired pnpm version
        run: test "$(pnpm --version)" = "11.3.0"

      - name: Acquire exact dependencies explicitly
        env:
          npm_config_offline: "false"
          npm_config_prefer_offline: "false"
          npm_config_ignore_scripts: "true"
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_update_notifier: "false"
          NO_UPDATE_NOTIFIER: "1"
        run: pnpm install --frozen-lockfile --ignore-scripts --config.offline=false

      - name: Verify P1 offline
        run: pnpm verify:p1
