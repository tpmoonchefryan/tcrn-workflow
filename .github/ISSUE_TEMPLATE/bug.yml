name: Bug report
description: Report a reproducible framework defect.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include secrets, personal data, or private evidence.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal offline reproduction
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 24.16.0
    validations:
      required: true
  - type: input
    id: pnpm
    attributes:
      label: pnpm version
      placeholder: 11.3.0
    validations:
      required: true
