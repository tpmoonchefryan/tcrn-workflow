version: 2

# The npm ecosystem is deliberately absent from version updates, and its absence is a
# decision rather than an oversight.
#
# A dependency here is pinned in three places that must agree: package.json, the lockfile,
# and scripts/policy/dependency-policy.json -- which keys on the exact version, carries the
# integrity hash, and requires a written `purpose` for every entry. Dependabot edits the
# first two. It cannot write the third, cannot regenerate the materialization store, the
# SBOM, or the verification-map digests. So every npm version-update pull request it opens
# is red before anyone reads it, not because the bump is wrong but because a bump here is a
# decision someone has to make and document.
#
# A permanently red weekly pull request is worse than no pull request. It teaches everyone
# to skim past red in a repository whose entire premise is that red means stopped.
#
# What replaces it: Dependabot alerts and security updates are enabled at the repository
# level. Those fire on an advisory rather than on a calendar, so when npm dependencies do
# raise a pull request it is worth the interrupt -- and it will still be red for the same
# structural reason, which is the correct signal at that point rather than noise.
#
# Routine bumps are done by hand as governed work: update all three pinned surfaces
# together, regenerate, and record why the version moved.
#
# github-actions stays on. It has no equivalent policy file, its pull requests can go green
# after the workflow digest is regenerated, and it just earned its place by surfacing the
# runner's Node 20 deprecation.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
